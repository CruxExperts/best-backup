# project.yaml
# Project identity metadata for docs, packaging, and maintainer automation.
# Keep this file aligned with README.md, pyproject.toml, and GitHub metadata.

project:
  name: bbackup
  description: "Docker Backup Tool with Rich TUI"
  repository: "https://github.com/CruxExperts/best-backup"

author:
  name: "Slavic Kozyuk"
  github: "cptnfren"

company:
  name: "Crux Experts LLC"
  url: "https://www.cruxexperts.com/"

copyright:
  year: 2026
  license: MIT

# Markdown files that receive the centered footer.
# Paths are relative to repo root.
# .github/ templates are intentionally excluded - footers don't belong in issue/PR forms.
stamp_targets:
  - README.md
  - QUICKSTART.md
  - INSTALL.md
  - CHANGELOG.md
  - docs/README.md
  - docs/architecture.md
  - docs/encryption.md
  - docs/management.md
  - scripts/README.md
  - .github/CONTRIBUTING.md
  - .github/CODE_OF_CONDUCT.md
